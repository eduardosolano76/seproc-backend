<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- Título dinámico -->
        <title
            th:text="${institucion != null ? institucion.abreviacion + ' | Iniciar sesión' : 'SEPROC | Iniciar sesión'}"
        >
            SeProc | Iniciar sesión
        </title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" th:href="@{/css/login/login.css}" />
    </head>
    <body class="login-page">
        <main class="login-shell">
            <section class="login-card">
                <aside class="login-brand-panel">
                    <div class="brand-overlay"></div>

                    <div class="brand-content">
                        <img
                            class="brand-logo"
                            th:src="@{/assets/iconos/logoSeproc.png}"
                            alt="Logo SEPROC"
                        />
                    </div>

                    <p class="brand-copy">© 2026 SEPROC. Todos los derechos reservados.</p>
                </aside>

                <section class="login-form-panel">
                    <div class="login-form-box">
                        <!-- Logo dinamico -->
                        <div
                            th:if="${institucion != null}"
                            style="text-align: center; margin-bottom: 16px"
                        >
                            <img
                                th:src="${logoUrl != null ? logoUrl : '/assets/logo.jpg'}"
                                th:alt="'Logo ' + ${institucion.abreviacion}"
                                style="max-height: 115px; width: auto; mix-blend-mode: multiply"
                            />
                        </div>

                        <h1 class="login-title">Iniciar sesión</h1>

                        <form class="login-form" th:action="@{/login}" method="post">
                            <div class="form-group">
                                <label for="username">Nombre de usuario:</label>
                                <input
                                    id="username"
                                    name="username"
                                    type="text"
                                    autocomplete="username"
                                    required
                                />
                            </div>

                            <div class="form-group">
                                <label for="password">Contraseña:</label>
                                <input
                                    id="password"
                                    name="password"
                                    type="password"
                                    autocomplete="current-password"
                                    required
                                />
                            </div>

                            <input
                                type="hidden"
                                th:name="${_csrf.parameterName}"
                                th:value="${_csrf.token}"
                            />

                            <input
                                type="hidden"
                                name="empresa"
                                th:if="${abreviacionUrl != null}"
                                th:value="${abreviacionUrl}"
                            />

                            <button class="btn-login" type="submit">Iniciar sesión</button>

                            <!-- Registro dinamico (Solo si hay institución) -->
                            <p class="register-prompt" th:if="${institucion != null}">
                                ¿No tienes cuenta?
                                <a
                                    class="btn-register-link"
                                    th:href="@{/registro/{abrev}(abrev=${abreviacionUrl})}"
                                >
                                    Regístrate en <span th:text="${institucion.abreviacion}"></span>
                                </a>
                            </p>

                            <p class="form-message error" th:if="${param.error}">
                                Usuario o contraseña incorrectos.
                            </p>

                            <p class="form-message success" th:if="${param.logout}">
                                Sesión cerrada correctamente.
                            </p>
                        </form>
                    </div>
                </section>
            </section>
        </main>
    </body>
</html>
