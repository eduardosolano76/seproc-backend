<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SEPROC | Registro</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" th:href="@{/css/registro/registro.css}" />
    </head>
    <body class="register-page">
        <main class="register-shell">
            <section class="register-card">
                <aside class="register-brand-panel">
                    <div class="brand-overlay"></div>

                    <div class="brand-content">
                        <img
                            class="brand-logo"
                            th:src="@{/assets/iconos/logoSeproc.png}"
                            alt="Logo SEPROC"
                        />
                    </div>

                    <p class="brand-copy">© 2026 SEPROC. Todos los derechos reservados.</p>
                </aside>

                <section class="register-form-panel">
                    <div class="register-form-box">
                        <!-- Logo de la institución -->
                        <div style="text-align: center; margin-bottom: 16px">
                            <img
                                th:src="@{/assets/logo.jpg}"
                                alt="Logo Institución"
                                style="max-height: 115px; width: auto; mix-blend-mode: multiply"
                            />
                        </div>

                        <h1 class="register-title">Registro</h1>

                        <form
                            class="register-form"
                            th:action="@{/registro}"
                            th:object="${registro}"
                            method="post"
                        >
                            <div class="form-row two-cols">
                                <div class="form-group">
                                    <label for="nombre">Nombre(s):</label>
                                    <input
                                        id="nombre"
                                        th:field="*{nombre}"
                                        name="nombre"
                                        type="text"
                                        required
                                    />
                                </div>

                                <div class="form-group">
                                    <label for="apellido">Apellidos:</label>
                                    <input
                                        id="apellido"
                                        th:field="*{apellido}"
                                        name="apellido"
                                        type="text"
                                        required
                                    />
                                </div>
                            </div>

                            <div class="form-row one-col">
                                <div class="form-group">
                                    <label for="email">Correo electrónico:</label>
                                    <input
                                        id="email"
                                        th:field="*{email}"
                                        name="email"
                                        type="email"
                                        required
                                    />
                                    <span
                                        class="error-text"
                                        th:if="${#fields.hasErrors('email')}"
                                        th:errors="*{email}"
                                    ></span>
                                </div>
                            </div>

                            <div class="form-row two-cols">
                                <div class="form-group">
                                    <label for="username">Nombre de usuario:</label>
                                    <input
                                        id="username"
                                        th:field="*{username}"
                                        name="username"
                                        type="text"
                                        required
                                    />
                                    <span
                                        class="error-text"
                                        th:if="${#fields.hasErrors('username')}"
                                        th:errors="*{username}"
                                    ></span>
                                </div>

                                <div class="form-group">
                                    <label for="password">Contraseña:</label>
                                    <input id="password" name="password" type="password" required />
                                </div>
                            </div>

                            <input
                                type="hidden"
                                th:name="${_csrf.parameterName}"
                                th:value="${_csrf.token}"
                            />

                            <button class="btn-register" type="submit">
                                Enviar solicitud de registro
                            </button>

                            <p class="login-prompt">
                                ¿Ya tienes cuenta?
                                <a class="btn-login-link" th:href="@{/login}">Inicia sesión</a>
                            </p>

                            <p class="form-message error" th:if="${error}" th:text="${error}">
                                Ocurrió un error al registrar.
                            </p>

                            <p class="form-message success" th:if="${mensaje}" th:text="${mensaje}">
                                Solicitud enviada correctamente.
                            </p>
                        </form>
                    </div>
                </section>
            </section>
        </main>
    </body>
</html>
