<div th:fragment="vistaSolicitar" id="view-solicitar" class="view-section hidden">
    <div class="auth-card" style="margin: 0 auto">
        <div class="auth-header">
            <h2>Solicitud de acceso</h2>
            <p>Ingresa los datos de tu dependencia para iniciar el proceso de afiliación.</p>
        </div>

        <form th:action="@{/solicitar-acceso}" th:object="${solicitud}" method="post">
            <div class="form-group">
                <label for="nombreDependencia" class="form-label"
                    >Nombre oficial de la dependencia *</label
                >
                <input
                    type="text"
                    id="nombreDependencia"
                    th:field="*{nombreDependencia}"
                    class="form-control"
                    required
                />
            </div>

            <div class="form-group">
                <label for="abreviacion" class="form-label">Siglas o abreviación *</label>
                <input
                    type="text"
                    id="abreviacion"
                    th:field="*{abreviacion}"
                    class="form-control"
                    required
                />
            </div>

            <div class="form-group">
                <label for="nombreContacto" class="form-label">Nombre del contacto *</label>
                <input
                    type="text"
                    id="nombreContacto"
                    th:field="*{nombreContacto}"
                    class="form-control"
                    required
                />
            </div>

            <div class="form-group">
                <label for="emailContacto" class="form-label"
                    >Correo electrónico del contacto *</label
                >
                <input
                    type="email"
                    id="emailContacto"
                    th:field="*{emailContacto}"
                    class="form-control"
                    required
                />
            </div>

            <div class="form-group">
                <label for="telefonoContacto" class="form-label">Teléfono del contacto *</label>
                <input
                    type="tel"
                    id="telefonoContacto"
                    th:field="*{telefonoContacto}"
                    class="form-control"
                    required
                />
            </div>

            <button type="submit" class="btn-primary btn-block cursor-pointer">
                Enviar solicitud
            </button>
        </form>
    </div>
</div>
